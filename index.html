<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderkarte - Wakendorf II</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
        }
        
        .main-content { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 1; height: 100%; }
        
        /* --- Popup Styling --- */
        .leaflet-popup-content-wrapper { border-radius: 8px; }
        .leaflet-popup-content { width: 280px !important; }
        .popup-content h3 { margin: 0 0 10px; color: #007BFF; }
        .popup-content img { width: 100%; height: auto; border-radius: 5px; margin-bottom: 5px; }
        .popup-content .stats { font-size: 0.9em; color: #555; margin-bottom: 10px; }
        .popup-button {
            background-color: #007BFF; color: white !important; border: none;
            padding: 10px 12px; border-radius: 5px; cursor: pointer;
            width: 100%; text-align: center; font-weight: bold;
            display: block; text-decoration: none; box-sizing: border-box;
        }
        .popup-button:hover { background-color: #0056b3; }

        /* --- VOLLBILD CONTROL --- */
        .leaflet-control-fullscreen a {
            display: block;
            width: 34px;
            height: 34px;
            background-color: white;
            background-size: 20px 20px;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
        }

        /* Icon: Vollbild öffnen */
        .leaflet-control-fullscreen a.fullscreen-enter {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>');
        }

        /* Icon: Vollbild verlassen */
        .leaflet-control-fullscreen a.fullscreen-exit {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>');
        }

        .leaflet-control-fullscreen a:hover {
            background-color: #f4f4f4;
        }

        /* --- STANDORT CONTROL --- */
        .leaflet-control-location a {
            display: block;
            width: 34px;
            height: 34px;
            background-color: white;
            background-size: 20px 20px;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .leaflet-control-location a:hover { background-color: #f4f4f4; }

        /* Icon: Standort inaktiv */
        .leaflet-control-location a.location-inactive {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="3 2"/></svg>');
        }
        /* Icon: Standort aktiv (blau) */
        .leaflet-control-location a.location-active {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="%23007AFF"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>');
            background-color: #EBF5FF;
        }
        /* Icon: Zentriert auf Standort */
        .leaflet-control-location a.location-following {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23007AFF" stroke="%23007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="white"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" fill="none"/></svg>');
            background-color: #007AFF;
        }

        /* --- STANDORT MARKER --- */
        .location-icon { background: none !important; border: none !important; }

        .location-wrapper {
            width: 40px; height: 40px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .location-cone {
            position: absolute;
            width: 0; height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 22px solid rgba(0, 122, 255, 0.35);
            top: 1px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 0 2px rgba(0,122,255,0.3));
        }

        .location-dot {
            width: 16px; height: 16px;
            background: #007AFF;
            border: 2.5px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.25), 0 2px 6px rgba(0,0,0,0.3);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: location-pulse 2s ease-out infinite;
        }

        @keyframes location-pulse {
            0%   { box-shadow: 0 0 0 3px rgba(0,122,255,0.25), 0 2px 6px rgba(0,0,0,0.3); }
            50%  { box-shadow: 0 0 0 8px rgba(0,122,255,0.08), 0 2px 6px rgba(0,0,0,0.3); }
            100% { box-shadow: 0 0 0 3px rgba(0,122,255,0.25), 0 2px 6px rgba(0,0,0,0.3); }
        }

        /* iOS Kompass-Hinweis */
        .ios-permission-toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            text-align: center;
            max-width: 280px;
            line-height: 1.4;
            display: none;
        }

        /* --- CUSTOM FILTER CONTROL STYLING --- */
        
        .custom-filter-control {
            background: white;
            border-radius: 4px; 
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            transition: width 0.2s ease, height 0.2s ease; 
            overflow: hidden; 
        }

        .custom-filter-control.collapsed {
            width: 34px;  
            height: 34px; 
            display: block;
            background-color: white;
            text-decoration: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23000" stroke-width="3" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>');
            background-size: 20px 20px;
            background-position: center;
            background-repeat: no-repeat;
        }

        .custom-filter-control.collapsed .toggle-button {
            width: 100%;
            height: 100%;
            display: block;            
        }

        .custom-filter-control.collapsed .filter-content,
        .custom-filter-control.collapsed h4 {
            display: none; 
        }

        .custom-filter-control:not(.collapsed) {
            width: auto;
            min-width: 220px;
            height: auto;
            padding: 10px;
        }

        .custom-filter-control:not(.collapsed) .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .custom-filter-control:not(.collapsed) .toggle-button {
            width: 20px;
            height: 20px;
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
        }
        
        .custom-filter-control h4 { margin: 0; font-size: 14px; color: #333; }
        .filter-section { margin-bottom: 12px; }
        .filter-section h5 { margin: 0 0 5px 0; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-option { display: block; margin-bottom: 5px; font-size: 13px; cursor: pointer; display: flex; align-items: center;}
        .filter-option input { margin-right: 8px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="main-content">
        <div id="map"></div>
    </div>
    <div class="ios-permission-toast" id="iosToast"></div>

  <script> 

    // === 1. KARTE & TILE LAYER ===
    var map = L.map('map').setView([53.7852, 10.087], 15);

    var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map); 
   
    var topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenTopoMap'
    });

    // === VOLLBILD CONTROL ===
    var FullscreenControl = L.Control.extend({
        options: { position: 'topleft' },

        onAdd: function (map) {
            var container = L.DomUtil.create('div', 'leaflet-control-fullscreen leaflet-bar');
            var link = L.DomUtil.create('a', 'fullscreen-enter', container);
            link.href = '#';
            link.title = 'Vollbild';

            L.DomEvent.on(link, 'click', function (e) {
                L.DomEvent.stop(e);
                toggleFullscreen();
            });

            // Zustand aktualisieren wenn Vollbild von außen beendet wird (z.B. ESC-Taste)
            document.addEventListener('fullscreenchange', function () {
                if (document.fullscreenElement) {
                    L.DomUtil.removeClass(link, 'fullscreen-enter');
                    L.DomUtil.addClass(link, 'fullscreen-exit');
                    link.title = 'Vollbild beenden';
                } else {
                    L.DomUtil.removeClass(link, 'fullscreen-exit');
                    L.DomUtil.addClass(link, 'fullscreen-enter');
                    link.title = 'Vollbild';
                    // Karte nach Resize neu berechnen
                    setTimeout(function () { map.invalidateSize(); }, 200);
                }
            });

            return container;
        }
    });

    map.addControl(new FullscreenControl());

    function toggleFullscreen() {
        var mapEl = document.getElementById('map');
        if (!document.fullscreenElement) {
            mapEl.requestFullscreen().then(function () {
                setTimeout(function () { map.invalidateSize(); }, 200);
            }).catch(function (err) {
                console.warn('Vollbild nicht möglich:', err.message);
            });
        } else {
            document.exitFullscreen();
        }
    }

    // === STANDORT CONTROL ===

    // Zustand
    var locationActive   = false;  // GPS läuft
    var followUser       = false;  // Karte folgt dem Nutzer
    var watchId          = null;
    var locationMarker   = null;
    var accuracyCircle   = null;
    var currentHeading   = null;
    var locationLink     = null;   // Referenz auf den Button

    var LocationControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            var container = L.DomUtil.create('div', 'leaflet-control-location leaflet-bar');
            locationLink = L.DomUtil.create('a', 'location-inactive', container);
            locationLink.href = '#';
            locationLink.title = 'Mein Standort';

            L.DomEvent.on(locationLink, 'click', function (e) {
                L.DomEvent.stop(e);
                handleLocationClick();
            });

            return container;
        }
    });
    map.addControl(new LocationControl());

    // --- Haupt-Logik beim Klick auf den Button ---
    function handleLocationClick() {
        if (!locationActive) {
            // Noch nicht aktiv → starten
            startLocation();
        } else if (!followUser) {
            // Aktiv, aber Karte folgt nicht → zentrieren & folgen
            followUser = true;
            setLocationButtonState('following');
            if (locationMarker) {
                map.setView(locationMarker.getLatLng(), map.getZoom());
            }
        } else {
            // Aktiv + folgt → alles stoppen
            stopLocation();
        }
    }

    function startLocation() {
        if (!navigator.geolocation) {
            showToast('Geolocation wird von diesem Browser nicht unterstützt.');
            return;
        }

        // iOS 13+: Kompass-Berechtigung anfragen
        requestCompassPermission();

        followUser = true;
        locationActive = true;
        setLocationButtonState('following');

        watchId = navigator.geolocation.watchPosition(
            onPositionUpdate,
            onPositionError,
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    }

    function stopLocation() {
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
        if (accuracyCircle)  { map.removeLayer(accuracyCircle);  accuracyCircle = null; }

        locationActive = false;
        followUser     = false;
        currentHeading = null;
        setLocationButtonState('inactive');
    }

    // --- GPS Position empfangen ---
    function onPositionUpdate(position) {
        var latlng   = L.latLng(position.coords.latitude, position.coords.longitude);
        var accuracy = position.coords.accuracy;

        // GPS-Heading nutzen, wenn vorhanden und bewegt (heading ist NaN im Stand)
        if (position.coords.heading !== null && !isNaN(position.coords.heading)) {
            currentHeading = position.coords.heading;
        }

        // Genauigkeitskreis
        if (!accuracyCircle) {
            accuracyCircle = L.circle(latlng, {
                radius: accuracy,
                color: '#007AFF', fillColor: '#007AFF',
                fillOpacity: 0.08, weight: 1, opacity: 0.4
            }).addTo(map);
        } else {
            accuracyCircle.setLatLng(latlng).setRadius(accuracy);
        }

        // Standortmarker
        if (!locationMarker) {
            locationMarker = L.marker(latlng, {
                icon: buildLocationIcon(currentHeading),
                zIndexOffset: 1000,
                interactive: false
            }).addTo(map);
        } else {
            locationMarker.setLatLng(latlng);
            locationMarker.setIcon(buildLocationIcon(currentHeading));
        }

        if (followUser) {
            map.setView(latlng, map.getZoom());
        }
    }

    function onPositionError(err) {
        var msg = 'Standort konnte nicht ermittelt werden.';
        if (err.code === 1) msg = 'Standortzugriff wurde verweigert.';
        if (err.code === 3) msg = 'Standortabfrage hat zu lange gedauert.';
        showToast(msg);
        stopLocation();
    }

    // --- Kompass / Geräteausrichtung ---
    function requestCompassPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS 13+
            DeviceOrientationEvent.requestPermission()
                .then(function (state) {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, true);
                    } else {
                        showToast('Kompasszugriff verweigert – nur GPS-Richtung verfügbar.');
                    }
                })
                .catch(function () {
                    showToast('Kompass konnte nicht aktiviert werden.');
                });
        } else {
            // Android & Desktop
            window.addEventListener('deviceorientation', onDeviceOrientation, true);
        }
    }

    function onDeviceOrientation(event) {
        if (!locationActive) return;

        var heading = null;
        if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
            // iOS liefert bereits korrigierte Kompassrichtung (0 = Norden)
            heading = event.webkitCompassHeading;
        } else if (event.alpha !== null && event.alpha !== undefined) {
            // Android: alpha ist Grad vom Norden, aber im Uhrzeigersinn → umkehren
            heading = (360 - event.alpha) % 360;
        }

        if (heading !== null) {
            currentHeading = heading;
            if (locationMarker) {
                locationMarker.setIcon(buildLocationIcon(currentHeading));
            }
        }
    }

    // --- Hilfsfunktionen ---
    function buildLocationIcon(heading) {
        var hasHeading = heading !== null && !isNaN(heading);
        var coneHtml = hasHeading
            ? `<div class="location-cone"></div>`
            : '';
        return L.divIcon({
            className: 'location-icon',
            html: `<div class="location-wrapper" style="transform: rotate(${hasHeading ? heading : 0}deg)">
                     ${coneHtml}
                     <div class="location-dot"></div>
                   </div>`,
            iconSize:   [40, 40],
            iconAnchor: [20, 20]
        });
    }

    function setLocationButtonState(state) {
        if (!locationLink) return;
        L.DomUtil.removeClass(locationLink, 'location-inactive');
        L.DomUtil.removeClass(locationLink, 'location-active');
        L.DomUtil.removeClass(locationLink, 'location-following');
        L.DomUtil.addClass(locationLink, 'location-' + state);
    }

    // Wenn der Nutzer die Karte verschiebt → Folgemodus beenden
    map.on('dragstart', function () {
        if (locationActive && followUser) {
            followUser = false;
            setLocationButtonState('active');
        }
    });

    function showToast(msg) {
        var toast = document.getElementById('iosToast');
        toast.textContent = msg;
        toast.style.display = 'block';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(function () { toast.style.display = 'none'; }, 3500);
    }

    // === GLOBALE VARIABLE FÜR HIGHLIGHTING ===
    var selectedRoute = null; 

    // === STYLING OPTIONEN ===
    var HIGHLIGHT_STYLE_OPTIONS = {
      weight: 8, 
      opacity: 1.0, 
      color: '#FF0000', 
      zIndex: 1000 
    };
   
    var STANDARD_STYLE_OPTIONS = {
      weight: 5,
      opacity: 0.8,
      zIndex: 1 
    };

    // === 2. DATENSPEICHER FÜR ROUTEN ===
    var allRoutes = [];

    var benchesLayer = L.geoJSON(null, {
      pointToLayer: function (feature, latlng) {
        return L.marker(latlng, {
          icon: L.icon({ iconUrl: 'images/marker/bank.png', iconSize: [40, 54], iconAnchor: [20, 54] })
        });
      }
    });
   
    var dogToiletsLayer = L.geoJSON(null, {
      pointToLayer: function (feature, latlng) {
        return L.marker(latlng, {
          icon: L.icon({ iconUrl: 'images/marker/mika.png', iconSize: [40, 54], iconAnchor: [20, 54] })
        });
      }
    });

    // === 3. DATEN LADEN ===
    fetch('baenke.geojson').then(r => r.json()).then(d => benchesLayer.addData(d));
    fetch('hundeWC.geojson').then(r => r.json()).then(d => dogToiletsLayer.addData(d));

    fetch('routes.json')
      .then(response => {
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return response.json();
      })
      .then(data => {
        processRoutes(data.routes);
      })
      .catch(error => console.error('Fehler beim Laden der routes.json:', error));


    // === 4. ROUTEN VERARBEITUNG ===
    function processRoutes(routes) {
      routes.forEach(route => {
        var popupHtml = buildPopupHtml(route);
        var routeColor = getColorById(route.id);
        var routeGroup = L.layerGroup();

        var routeItem = {
          id: route.id,
          layer: routeGroup,
          categories: route.categories, 
          originalColor: routeColor
        };

        function attachEvents(gpxLayer) {
            gpxLayer.bindPopup(popupHtml);
            gpxLayer.on('click', function (ev) {
                L.DomEvent.stopPropagation(ev);
                highlightRoute(routeItem);
            });
        }

        if (route.gpx_parts && route.gpx_parts.length > 0) {
          route.gpx_parts.forEach(part => {
            var partStyle = getStyleOptions(part.style, routeColor);
            var gpxLayer = createGpxLayer(part.file, partStyle);
            gpxLayer.on('loaded', function(e) {
                attachEvents(e.target);
            });
            gpxLayer.addTo(routeGroup);
          });
        } else if (route.gpx_file) {
          var standardStyle = getStyleOptions('standard', routeColor);
          var gpxLayer = createGpxLayer(route.gpx_file, standardStyle);
          gpxLayer.on('loaded', function(e) {
              attachEvents(e.target);
          });
          gpxLayer.addTo(routeGroup);
        }
        
        allRoutes.push(routeItem);
      });

      updateMapFilter();
    }
   
    // === HIGHLIGHTING ===

    function highlightRoute(routeItem) {
        if (selectedRoute === routeItem) return;
        if (selectedRoute) resetHighlight();

        selectedRoute = routeItem;
        
        routeItem.layer.eachLayer(gpxLayer => {
            gpxLayer.eachLayer(layer => {
                if (layer instanceof L.Polyline) {
                    layer.setStyle({
                        color: routeItem.originalColor, 
                        weight: HIGHLIGHT_STYLE_OPTIONS.weight,
                        opacity: HIGHLIGHT_STYLE_OPTIONS.opacity,
                        pane: 'overlayPane'
                    });
                    if (layer.bringToFront) layer.bringToFront(); 
                }
            });
        });
    }

    function resetHighlight() {
        if (!selectedRoute) return;

        selectedRoute.layer.eachLayer(gpxLayer => {
            gpxLayer.eachLayer(layer => {
                if (layer instanceof L.Polyline) {
                    layer.setStyle({
                        color: selectedRoute.originalColor,
                        weight: STANDARD_STYLE_OPTIONS.weight,
                        opacity: STANDARD_STYLE_OPTIONS.opacity
                    });
                }
            });
        });

        selectedRoute = null; 
    }

    map.on('popupclose', function(e) {
        resetHighlight();
    });

    map.on('click', function(e) {
        resetHighlight();
        var menuDiv = document.querySelector('.custom-filter-control');
        if (menuDiv && !L.DomUtil.hasClass(menuDiv, 'collapsed')) {
            L.DomUtil.addClass(menuDiv, 'collapsed');
        }
    });

    // === 5. CUSTOM CONTROL ===
    var filterControl = L.control({position: 'topright'});

    filterControl.onAdd = function (map) {
      var div = L.DomUtil.create('div', 'custom-filter-control leaflet-bar collapsed');
      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);

      div.innerHTML = `
        <div class="header-row">
          <h4>Filter & Optionen</h4>
          <a href="#" class="toggle-button" title="Menü umschalten"></a>
        </div>

        <div class="filter-content">
          <div class="filter-section">
            <h5>Karten Typ</h5>
            <label class="filter-option">
              <input type="radio" name="mapType" value="osm" checked onchange="updateMapType()"> OpenStreetMap
            </label>
            <label class="filter-option">
              <input type="radio" name="mapType" value="otm" onchange="updateMapType()"> OpenTopoMap
            </label>
          </div>

          <div class="filter-section">
            <h5>Routen Länge</h5>
            <label class="filter-option">
              <input type="radio" name="routeLength" value="short" onchange="updateMapFilter()"> 👠 Kurz (0-1 km)
            </label>
            <label class="filter-option">
              <input type="radio" name="routeLength" value="mid" onchange="updateMapFilter()"> 👟 Mittel (1-4 km)
            </label>
            <label class="filter-option">
              <input type="radio" name="routeLength" value="long" onchange="updateMapFilter()"> 🥾 Lang (> 4 km)
            </label>
            <label class="filter-option">
              <input type="radio" name="routeLength" value="all" checked onchange="updateMapFilter()"> Alle anzeigen
            </label>
          </div>

          <div class="filter-section">
            <h5>Barrierefreiheit</h5>
            <label class="filter-option">
              <input type="checkbox" id="cb-barrierfree" onchange="updateMapFilter()"> ♿ Nur Barrierefrei
            </label>
          </div>

          <div class="filter-section">
            <h5>Marker</h5>
            <label class="filter-option">
              <input type="checkbox" id="cb-benches" onchange="toggleLayer(this, benchesLayer)"> 🪑 Bänke
            </label>
            <label class="filter-option">
              <input type="checkbox" id="cb-dogs" onchange="toggleLayer(this, dogToiletsLayer)"> 💩 Hunde-WC
            </label>
          </div>
        </div>
      `;

      var toggleBtn = div.querySelector('.toggle-button');
      
      function toggleMenu(e) {
        if(e) L.DomEvent.stop(e);
        if (L.DomUtil.hasClass(div, 'collapsed')) {
          L.DomUtil.removeClass(div, 'collapsed');
        } else {
          L.DomUtil.addClass(div, 'collapsed');
        }
      }

      L.DomEvent.on(toggleBtn, 'click', toggleMenu);
      L.DomEvent.on(div, 'click', function(e) {
        if (L.DomUtil.hasClass(div, 'collapsed')) {
          toggleMenu(e);
        }
      });

      return div;
    };
    filterControl.addTo(map);

    function updateMapType() {
        var selectedType = document.querySelector('input[name="mapType"]:checked').value;
        if (selectedType === 'osm') {
            if (!map.hasLayer(osmLayer)) map.addLayer(osmLayer);
            if (map.hasLayer(topoLayer)) map.removeLayer(topoLayer);
        } else if (selectedType === 'otm') {
            if (!map.hasLayer(topoLayer)) map.addLayer(topoLayer);
            if (map.hasLayer(osmLayer)) map.removeLayer(osmLayer);
        }
        if (selectedType === 'osm') osmLayer.bringToBack();
        if (selectedType === 'otm') topoLayer.bringToBack();
    }

    function updateMapFilter() {
      resetHighlight();
      var showBarrierFree = document.getElementById('cb-barrierfree').checked;
      var selectedLength = document.querySelector('input[name="routeLength"]:checked').value;

      allRoutes.forEach(routeItem => {
        var showThisRoute = false;
        var matchesLength = (selectedLength === 'all') ? true : routeItem.categories.includes(selectedLength);
        var isBlocked = routeItem.categories.includes('blocked');
        var passesBarrierCheck = !(showBarrierFree && isBlocked);
        showThisRoute = matchesLength && passesBarrierCheck;

        if (showThisRoute) {
          if (!map.hasLayer(routeItem.layer)) map.addLayer(routeItem.layer);
        } else {
          if (map.hasLayer(routeItem.layer)) map.removeLayer(routeItem.layer);
        }
      });
    }

    function toggleLayer(checkbox, layer) {
      if (checkbox.checked) {
        map.addLayer(layer);
      } else {
        map.removeLayer(layer);
      }
    }

    function getStyleOptions(styleType, routeColor) {
      var baseOptions = { 
        color: routeColor, 
        weight: STANDARD_STYLE_OPTIONS.weight, 
        opacity: STANDARD_STYLE_OPTIONS.opacity,
        zIndex: STANDARD_STYLE_OPTIONS.zIndex
      };
      if (styleType === 'gestrichelt') baseOptions.dashArray = '10, 10';
      return baseOptions;
    }
   
    function buildPopupHtml(route) {
      var imagesHtml = route.images.map(imgUrl => `<img src="${imgUrl}" alt="${route.name}">`).join('');
      var gpxFiles = [];
      if (route.gpx_parts && route.gpx_parts.length > 0) {
        gpxFiles = route.gpx_parts.map(p => p.file);
      } else if (route.gpx_file) {
        gpxFiles.push(route.gpx_file);
      }
      var gpxFilesString = JSON.stringify(gpxFiles);

      return `
        <div class="popup-content">
          <h3>${route.name}</h3>
          ${imagesHtml}
          <div class="stats">
            <b>Länge:</b> ${route.length_km} km<br>
            <b>Dauer:</b> ca. ${route.duration_min} Min.
          </div>
          <p>${route.description}</p>
          <button class="popup-button" onclick='downloadGpxFiles(${gpxFilesString})'>
            GPX Download (${gpxFiles.length} Datei${gpxFiles.length !== 1 ? 'en' : ''})
          </button>
        </div>
      `;   
    }

    function getColorById(id) {
      var numId = 0;
      var strId = id.toString();
      for (var i = 0; i < strId.length; i++) {
        numId = strId.charCodeAt(i) + ((numId << 5) - numId);
      }
      var hue = Math.abs((numId * 137.508) % 360);
      return `hsl(${hue}, 70%, 45%)`;
    }

    function createGpxLayer(gpxFile, styleOptions) {
      return new L.GPX(gpxFile, {
        async: true,
        polyline_options: styleOptions,
        marker_options: {
          startIconUrl: '', endIconUrl: '', shadowUrl: '', wptIconUrls: {}
        },
      });
    }

    function downloadGpxFiles(fileUrls) {
      if (!Array.isArray(fileUrls) || fileUrls.length === 0) return;
      fileUrls.forEach(url => {
        var link = document.createElement('a');
        link.href = url;
        link.download = url.substring(url.lastIndexOf('/') + 1);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    }

  </script>
</body>
</html>
